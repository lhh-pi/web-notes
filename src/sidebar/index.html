<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Notes</title>
  <link rel="stylesheet" href="../styles/sidebar.css" />
</head>
<body class="wn-sidebar">
  <header class="wn-header">
    <h1 class="wn-title">Web Notes</h1>
    <div class="wn-header-actions">
      <button id="theme-toggle" class="wn-btn wn-btn--icon" title="Toggle theme">&#9788;</button>
    </div>
  </header>

  <!-- Sync permission banner (hidden by default) -->
  <div id="sync-banner" class="wn-sync-banner" style="display:none;">
    <span class="wn-sync-banner-text">
      ⚠ Auto-sync paused — 自动同步已暂停：文件写入权限不足 / File write permission needed
    </span>
    <div class="wn-sync-banner-actions">
      <button id="sync-banner-grant" class="wn-btn wn-btn--small wn-btn--primary">Grant / 授权</button>
      <button id="sync-banner-manual" class="wn-btn wn-btn--small">Switch to manual / 切换手动</button>
    </div>
  </div>

  <div class="wn-tabs">
    <button class="wn-tab wn-tab--active" data-tab="page">This Page</button>
    <button class="wn-tab" data-tab="all">All Notes</button>
    <button class="wn-tab" data-tab="search">Search</button>
  </div>

  <section id="panel-page" class="wn-panel wn-panel--active">
    <div id="page-info" class="wn-page-info">
      <p class="wn-page-url">Loading...</p>
    </div>
    <div id="notes-list" class="wn-notes-list">
      <!-- Dynamically populated -->
    </div>
    <div id="no-notes" class="wn-empty" style="display:none;">
      <p>No highlights on this page yet.</p>
      <p class="wn-hint">Select text and right-click to highlight.</p>
    </div>
  </section>

  <section id="panel-all" class="wn-panel">
    <div class="wn-search-bar">
      <input
        type="text"
        id="page-filter-input"
        class="wn-search-input"
        placeholder="Filter pages by title or URL..."
        autocomplete="off"
      />
    </div>
    <div id="page-list" class="wn-page-list">
      <!-- Dynamically populated -->
    </div>
    <div id="no-pages" class="wn-empty" style="display:none;">
      <p>No pages found.</p>
    </div>
  </section>

  <section id="panel-search" class="wn-panel">
    <div class="wn-search-bar">
      <input
        type="text"
        id="search-input"
        class="wn-search-input"
        placeholder="Search all notes..."
        autocomplete="off"
      />
    </div>
    <div id="search-results" class="wn-search-results">
      <!-- Dynamically populated -->
    </div>
    <div id="no-results" class="wn-empty" style="display:none;">
      <p>No results found.</p>
    </div>
  </section>

  <footer class="wn-footer">
    <div class="wn-sync-section">
      <!-- Sync mode selector -->
      <label class="wn-sync-label">
        Sync:
        <select id="sync-mode-select" class="wn-sync-select">
          <option value="off">Off</option>
          <option value="auto">Auto</option>
          <option value="manual">Manual</option>
        </select>
      </label>

      <!-- Sync file name -->
      <span id="sync-file-name" class="wn-sync-file-name">No sync file</span>

      <!-- Choose / change sync file -->
      <button id="sync-file-btn" class="wn-btn wn-btn--small" title="Choose sync file location">
        Choose...
      </button>

      <!-- Sync now button (visible in manual mode) -->
      <button id="sync-now-btn" class="wn-btn wn-btn--small" title="Sync now" style="display:none;">
        ↻ Sync now
      </button>

      <!-- Sync status -->
      <span id="sync-status" class="wn-sync-status"></span>
    </div>

    <div class="wn-io-section">
      <button id="export-json-btn" class="wn-btn wn-btn--small" title="Download all notes as JSON">
        ↓ Export JSON
      </button>
      <button id="import-json-btn" class="wn-btn wn-btn--small" title="Import notes from JSON file">
        ↑ Import JSON
      </button>
      <button id="clear-data-btn" class="wn-btn wn-btn--small wn-btn--danger" title="Delete all notes from IndexedDB">
        Clear Data
      </button>
    </div>
  </footer>

  <script type="module" src="./index.ts"></script>
</body>
</html>
